<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Acquisition OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --sidebar: #13141a;
  --surface: #1a1c24;
  --surface2: #21232e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e9f0;
  --text2: #8b8fa8;
  --text3: #555870;
  --accent: #7c3aed;
  --accent2: #a78bfa;
  --accent-dim: rgba(124,58,237,0.12);
  --accent-glow: rgba(124,58,237,0.3);
  --lead: #3b82f6;
  --lead-bg: rgba(59,130,246,0.12);
  --warm: #f59e0b;
  --warm-bg: rgba(245,158,11,0.12);
  --proposal: #8b5cf6;
  --proposal-bg: rgba(139,92,246,0.12);
  --client: #10b981;
  --client-bg: rgba(16,185,129,0.12);
  --danger: #ef4444;
  --radius: 10px;
  --radius-lg: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:'DM Sans',sans-serif;font-weight:600;font-size:18px;color:var(--accent2);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.logo-mark span{font-size:11px;font-weight:400;color:var(--text3);display:block;letter-spacing:1px;text-transform:uppercase;font-family:'DM Sans',sans-serif}
.nav{padding:16px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;margin-bottom:2px;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent2);font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:16px 12px 6px;font-weight:500}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.revenue-pill{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px;text-align:center}
.revenue-pill-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px}
.revenue-pill-val{font-family:'DM Sans',sans-serif;font-weight:600;font-size:22px;color:#34d399}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{padding:0 28px;height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0;background:var(--bg)}
.topbar-title{font-family:'DM Sans',sans-serif;font-weight:600;font-size:18px;color:var(--text);flex:1;letter-spacing:-0.3px}
.search-box{position:relative}
.search-box input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;font-size:13px;color:var(--text);width:220px;outline:none;font-family:'DM Sans',sans-serif}
.search-box input:focus{border-color:var(--border2)}
.search-box input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;width:15px;height:15px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--accent);color:#0e0f11}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:24px 28px;min-height:0}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* DASHBOARD */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px}
.stat-card-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px;font-weight:500}
.stat-card-val{font-family:'DM Sans',sans-serif;font-weight:600;font-size:28px;color:var(--text);margin-bottom:4px;letter-spacing:-1px}
.stat-card-sub{font-size:12px;color:var(--text3)}
.stat-card.accent{border-color:var(--accent-glow);background:var(--accent-dim)}
.stat-card.accent .stat-card-val{color:var(--accent2)}
.dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.panel-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:.6px}
.stage-bar{display:flex;flex-direction:column;gap:10px}
.stage-row{display:flex;align-items:center;gap:12px}
.stage-row-label{font-size:13px;color:var(--text2);width:70px;flex-shrink:0}
.stage-row-bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.stage-row-fill{height:100%;border-radius:3px;transition:width .4s ease}
.stage-row-count{font-size:12px;color:var(--text3);width:20px;text-align:right}
.recent-list{display:flex;flex-direction:column;gap:8px}
.recent-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.recent-item:last-child{border-bottom:none}

/* CONTACTS / PIPELINE */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.filter-pill:hover{border-color:var(--border2);color:var(--text)}
.filter-pill.active{background:var(--accent-dim);border-color:var(--accent-glow);color:var(--accent2)}
.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-left:auto}
.view-btn{padding:6px 12px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:12px;transition:all .15s;font-family:'DM Sans',sans-serif}
.view-btn.active{background:var(--surface2);color:var(--text)}

/* LIST VIEW */
.contact-list{display:flex;flex-direction:column;gap:6px}
.contact-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:42px 1fr auto auto 120px auto;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
.contact-row:hover{border-color:var(--border2);background:var(--surface2)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.contact-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.contact-sub{font-size:12px;color:var(--text2)}
.stage-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.source-badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:500;background:var(--surface2);color:var(--text3);letter-spacing:.3px}
.li-btn{width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--text3);text-decoration:none;border:1px solid var(--border);transition:all .15s;flex-shrink:0}
.li-btn:hover{background:rgba(10,102,194,0.15);color:#0a66c2;border-color:rgba(10,102,194,0.3)}
.advance-btn{width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;background:transparent;color:var(--text3);border:1px solid var(--border);cursor:pointer;transition:all .15s;flex-shrink:0}
.advance-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-glow)}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.kanban-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.kanban-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.8px}
.kanban-count{font-size:11px;background:var(--surface2);padding:3px 8px;border-radius:10px;color:var(--text3)}
.kanban-cards{padding:12px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.kanban-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s}
.kanban-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.kanban-card-name{font-size:13px;font-weight:500;margin-bottom:3px}
.kanban-card-sub{font-size:11px;color:var(--text3)}
.kanban-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}

/* DETAIL DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;width:420px;height:100vh;background:var(--sidebar);border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-close{background:none;border:none;color:var(--text3);cursor:pointer;float:right;font-size:18px;line-height:1;margin-top:-2px}
.drawer-close:hover{color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px}
.drawer-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;margin-bottom:12px}
.drawer-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:20px;margin-bottom:4px}
.drawer-sub{font-size:13px;color:var(--text2);margin-bottom:14px}
.drawer-section{margin-bottom:22px}
.drawer-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;font-weight:500}
.stage-buttons{display:flex;flex-wrap:wrap;gap:6px}
.stage-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.stage-btn:hover{border-color:var(--border2);color:var(--text)}
.note-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none;min-height:80px;outline:none}
.note-box:focus{border-color:var(--border2)}
.note-box::placeholder{color:var(--text3)}
.note-save-btn{margin-top:8px;padding:7px 14px;background:var(--accent);color:#0e0f11;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.note-save-btn:hover{background:var(--accent2)}
.note-entry{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:6px}
.note-text{font-size:13px;color:var(--text);line-height:1.5}
.note-date{font-size:11px;color:var(--text3);margin-top:4px}

/* ADD CONTACT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:480px;max-width:95vw}
.modal-title{font-family:'DM Sans',sans-serif;font-weight:600;font-size:20px;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500}
input[type=text],input[type=url],input[type=number],select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%}
input[type=text]:focus,input[type=url]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--border2)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface)}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{margin:0 auto 14px;display:block;opacity:.3}

/* UTILS */
.flex{display:flex;align-items:center}
.gap-8{gap:8px}
.ml-auto{margin-left:auto}
scrollbar-width:thin;

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media (max-width: 768px) {
  .sidebar { display: none !important; }
  .main { width: 100vw !important; height: 100dvh !important; padding-bottom: 68px; }
  .topbar { padding: 0 14px !important; height: 52px !important; gap: 8px !important; }
  .topbar-title { font-size: 15px !important; }
  .search-box { display: none !important; }
  .btn-ghost { display: none !important; }
  .btn-primary { padding: 7px 12px !important; font-size: 12px !important; }
  .content { padding: 14px !important; overflow-y: auto !important; -webkit-overflow-scrolling: touch !important; }
  .stat-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; margin-bottom: 14px !important; display: grid !important; }
  .stat-card { padding: 12px 14px !important; }
  .stat-card-val { font-size: 22px !important; }
  .stat-card-label { font-size: 10px !important; }
  .stat-card-sub { font-size: 10px !important; }
  .dash-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
  .panel { padding: 14px !important; }
  .contact-row { grid-template-columns: 36px 1fr auto !important; gap: 8px !important; padding: 12px !important; }
  .contact-row > .source-badge { display: none !important; }
  .contact-name { font-size: 13px !important; }
  .contact-sub { font-size: 11px !important; }
  .kanban { grid-template-columns: repeat(4, 240px) !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }
  .drawer { width: 100% !important; border-left: none !important; border-top: 1px solid var(--border) !important; border-radius: 20px 20px 0 0 !important; top: auto !important; bottom: 0 !important; height: 88dvh !important; transform: translateY(100%) !important; }
  .drawer.open { transform: translateY(0) !important; }
  .modal { width: 96vw !important; padding: 18px 14px !important; max-height: 90dvh !important; overflow-y: auto !important; }
  .form-grid { grid-template-columns: 1fr !important; }
  .form-group.full { grid-column: 1 !important; }
  #install-banner { bottom: 76px !important; }
  #mobile-nav { display: flex !important; }
}
#mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;

  align-items: center;

let contacts = [];
let activeView = 'dashboard';
let stageFilter = '';
let sourceFilter = '';
let listMode = 'list';
let selectedId = null;
let nextId = 31;

function load() {
  const saved = localStorage.getItem('caos_contacts');
  if (!saved) {
    contacts = JSON.parse(JSON.stringify(SEED));
  } else {
    contacts = JSON.parse(saved);
    // Merge in any new SEED contacts not already saved
    const existingIds = new Set(contacts.map(c => c.id));
    const existingLI = new Set(contacts.map(c => (c.linkedin||'').toLowerCase().replace(/\/+$/,'')));
    SEED.forEach(s => {
      const li = (s.linkedin||'').toLowerCase().replace(/\/+$/,'');
      if (!existingIds.has(s.id) && !existingLI.has(li)) {
        contacts.push(JSON.parse(JSON.stringify(s)));
      }
    });
  }
  nextId = contacts.reduce((m,c)=>Math.max(m,c.id),0) + 1;
  save();
}
function save() { localStorage.setItem('caos_contacts', JSON.stringify(contacts)); }

function initials(name) { return name.split(' ').slice(0,2).map(n=>n[0]||'').join('').toUpperCase(); }

function avatarHtml(contact, size, radius) {
  size = size || 38; radius = radius || '50%';
  var name = (contact.name || 'User').replace(/&/g,'and');
  var bgs = ['7c3aed','6d28d9','4f46e5','0891b2','059669','dc2626','d97706','8b5cf6'];
  var idNum = typeof contact.id === 'number' ? contact.id : parseInt((contact.id||'0').toString().replace(/[^0-9]/g,'').slice(0,8)||'0',10);
  var bg = bgs[idNum % bgs.length] || bgs[0];
  var url = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=' + bg + '&color=fff&size=128&bold=true';
  var r = radius === '50%' ? '50%' : radius;
  return '<img src="' + url + '" width="' + size + '" height="' + size + '" style="border-radius:' + r + ';flex-shrink:0;object-fit:cover" alt="' + name + '">';
}

const STAGE_META = {
  lead:      {label:'Lead',      color:'var(--lead)',     bg:'var(--lead-bg)',     hex:'#3b82f6'},
  contacted: {label:'Contacted', color:'#f97316',         bg:'rgba(249,115,22,0.12)', hex:'#f97316'},
  warm:      {label:'Warm',      color:'var(--warm)',     bg:'var(--warm-bg)',     hex:'#f59e0b'},
  proposal:  {label:'Proposal',  color:'var(--proposal)', bg:'var(--proposal-bg)', hex:'#8b5cf6'},
  client:    {label:'Client',    color:'var(--client)',   bg:'var(--client-bg)',   hex:'#10b981'},
};

const AV_COLORS = [
  ['#e8c76a','#3a2e00'],['#6ee7b7','#064e3b'],['#a5b4fc','#1e1b4b'],
  ['#fca5a5','#450a0a'],['#93c5fd','#1e3a5f'],['#d9f99d','#14532d'],
];
function avColor(id){return AV_COLORS[id%AV_COLORS.length]}

function stageBadge(stage){
  const m=STAGE_META[stage]||STAGE_META.lead;
  return `<span class="stage-badge" style="background:${m.bg};color:${m.color}">${m.label}</span>`;
}

function renderDashboard(){
  const total = contacts.length;
  const clients = contacts.filter(c=>c.stage==='client');
  const revenue = clients.reduce((a,c)=>a+(c.revenue||0),0);
  const pipeline = contacts.filter(c=>c.stage==='contacted'||c.stage==='warm'||c.stage==='proposal').length;

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card" style="border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.08)">
      <div class="stat-card-label">Revenue Closed</div>
      <div class="stat-card-val" style="color:#34d399">$${revenue.toLocaleString()}</div>
      <div class="stat-card-sub">${clients.length} client${clients.length!==1?'s':''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Total Contacts</div>
      <div class="stat-card-val" style="color:#34d399">${total}</div>
      <div class="stat-card-sub">across all stages</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">In Pipeline</div>
      <div class="stat-card-val" style="color:#34d399">${pipeline}</div>
      <div class="stat-card-sub">contacted → proposal</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Cold Leads</div>
      <div class="stat-card-val" style="color:#34d399">${contacts.filter(c=>c.stage==='lead').length}</div>
      <div class="stat-card-sub">to outreach</div>
    </div>
  `;
  document.getElementById('sidebar-rev').textContent = '$' + revenue.toLocaleString();

  const stages = ['lead','contacted','warm','proposal','client'];
  const max = Math.max(...stages.map(s=>contacts.filter(c=>c.stage===s).length),1);
  document.getElementById('stage-bar').innerHTML = stages.map(s=>{
    const m=STAGE_META[s]; const n=contacts.filter(c=>c.stage===s).length;
    return `<div class="stage-row">
      <div class="stage-row-label" style="color:${m.color}">${m.label}</div>
      <div class="stage-row-bar"><div class="stage-row-fill" style="width:${Math.round(n/max*100)}%;background:${m.color}"></div></div>
      <div class="stage-row-count">${n}</div>
    </div>`;
  }).join('');

  const recent = contacts.filter(c=>c.notes&&c.notes.length).slice(0,5);
  document.getElementById('recent-list').innerHTML = recent.length ? recent.map(c=>{
    const [bg,fg]=avColor(c.id);
    return `<div class="recent-item">
      <div class="avatar" style="background:${bg};color:${fg};width:30px;height:30px;font-size:11px">${initials(c.name)}</div>
      <div><div style="font-size:13px;font-weight:500">${c.name}</div><div style="font-size:11px;color:var(--text3)">${c.notes[0].text.slice(0,45)}…</div></div>
      ${stageBadge(c.stage)}
    </div>`;
  }).join('') : '<div style="color:var(--text3);font-size:13px">No activity yet — add notes to contacts</div>';
}

function getFiltered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  return contacts.filter(c=>{
    const ms = !stageFilter || c.stage===stageFilter;
    const mso = !sourceFilter || c.source===sourceFilter;
    const mq = !q || (c.name+c.title+c.company+c.location).toLowerCase().includes(q);
    return ms && mso && mq;
  });
}

function renderContacts(){
  const filtered = getFiltered();
  const wrap = document.getElementById('contact-list-wrap');

  if(listMode==='grid'){
    wrap.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">${filtered.map(c=>{
      return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'" onclick="openDrawer(${c.id})">

        <div style="font-weight:500;margin-bottom:3px">${c.name}</div>

        <div style="display:flex;align-items:center;justify-content:space-between">

          ${c.linkedin?`<a href="${c.linkedin}" target="_blank" class="li-btn" onclick="event.stopPropagation()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>`:''}
        </div>
      </div>`;
    }).join('')}</div>`;
    return;
  }

  wrap.innerHTML=`<div class="contact-list">${filtered.map(c=>{
    const [bg,fg]=avColor(c.id);
    return `<div class="contact-row" onclick="openDrawer(${c.id})">
      ${avatarHtml(c)}

        <div class="contact-name">${c.name}</div>

        ${c.linkedin?`<a href="${c.linkedin}" target="_blank" class="li-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>`:'<div style="width:30px"></div>'}
        <button class="advance-btn" onclick="quickAdvance(${c.id})" title="Advance stage">→</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderKanban(){
  const stages = ['lead','contacted','warm','proposal','client'];
  document.getElementById('kanban').innerHTML = stages.map(s=>{
    const m=STAGE_META[s];
    const cols=contacts.filter(c=>c.stage===s);
    return `<div class="kanban-col">
      <div class="kanban-header">
        <span class="kanban-title" style="color:${m.color}">${m.label}</span>
        <span class="kanban-count">${cols.length}</span>
      </div>
      <div class="kanban-cards">
        ${cols.map(c=>{
          const [bg,fg]=avColor(c.id);
          return `<div class="kanban-card" onclick="openDrawer(${c.id})">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <div class="avatar" style="background:${bg};color:${fg};width:28px;height:28px;font-size:10px;flex-shrink:0">${initials(c.name)}</div>
              <div class="kanban-card-name">${c.name}</div>
            </div>
            <div class="kanban-card-sub">${c.company||c.title||''}</div>
            <div class="kanban-card-foot">
              <span style="font-size:10px;color:var(--text3)">${c.source}</span>
              ${c.revenue?`<span style="font-size:11px;color:var(--client);font-weight:500">$${c.revenue.toLocaleString()}</span>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderAll(){
  renderDashboard();
  renderContacts();
  renderKanban();
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  activeView = name;
  const titles = {dashboard:'Dashboard',contacts:'Contacts',pipeline:'Pipeline — Kanban',jobs:'Jobs'};
  document.getElementById('page-title').textContent = titles[name]||name;
  if(name==='jobs') loadAndRenderJobs();
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`.nav-item[data-view="${name}"]`)?.classList.add('active');
}

function applyFilters(){
  renderContacts();
  if(activeView==='pipeline')renderKanban();
  if(activeView==='dashboard')renderDashboard();
}

document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    const view = item.dataset.view;
    const filter = item.dataset.filter||'';
    sourceFilter = filter;
    stageFilter = '';
    document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
    document.querySelector('.filter-pill[data-stage=""]')?.classList.add('active');
    showView(view);
    renderAll();
  });
});

document.querySelectorAll('.filter-pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    stageFilter = pill.dataset.stage;
    renderContacts();
  });
});

function setListMode(mode,btn){
  listMode=mode;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderContacts();
}

function quickAdvance(id){
  const c=contacts.find(x=>x.id===id);
  const order=['lead','contacted','warm','proposal','client'];
  const i=order.indexOf(c.stage);
  if(i<order.length-1){c.stage=order[i+1];save();renderAll();}
}

function openDrawer(id){
  selectedId=id;
  const c=contacts.find(x=>x.id===id);
  const [bg,fg]=avColor(c.id);
  const m=STAGE_META[c.stage];
  document.getElementById('drawer-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <div class="drawer-avatar" style="background:${bg};color:${fg}">${initials(c.name)}</div>
      <div>
        <div class="drawer-name">${c.name}</div>
        <div class="drawer-sub">${c.title||''}${c.company?' · '+c.company:''}</div>
      </div>
    </div>
  `;
  const stages=['lead','contacted','warm','proposal','client'];
  document.getElementById('drawer-body').innerHTML=`
    ${c.linkedin?`<div class="drawer-section"><div class="drawer-label">LinkedIn</div>
      <a href="${c.linkedin}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;color:var(--lead);font-size:13px;text-decoration:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        View LinkedIn Profile →
      </a></div>`:''}
    <div class="drawer-section">
      <div class="drawer-label">Pipeline stage</div>
      <div class="stage-buttons">${stages.map(s=>`<button class="stage-btn" style="${c.stage===s?`background:${STAGE_META[s].bg};color:${STAGE_META[s].color};border-color:${STAGE_META[s].color}`:''}" onclick="setStage(${c.id},'${s}')">${STAGE_META[s].label}</button>`).join('')}</div>
    </div>
    ${c.stage==='client'&&c.revenue?`<div class="drawer-section"><div class="drawer-label">Revenue</div><div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--client)">$${c.revenue.toLocaleString()}</div></div>`:''}
    <div class="drawer-section">
      <div class="drawer-label">Details</div>
      <table style="font-size:13px;width:100%;border-collapse:collapse">
        ${c.location?`<tr><td style="color:var(--text3);padding:4px 0;width:80px">Location</td><td>${c.location}</td></tr>`:''}
        <tr><td style="color:var(--text3);padding:4px 0">Source</td><td>${c.source}</td></tr>
      </table>
    </div>
    <div class="drawer-section">
      <div class="drawer-label">Outreach log & notes</div>
      <textarea class="note-box" id="note-input" placeholder="Log a call, message, or next step…"></textarea>
      <button class="note-save-btn" onclick="saveNote(${c.id})">Save Note</button>
      <div style="margin-top:12px" id="notes-list">
        ${(c.notes||[]).map(n=>`<div class="note-entry"><div class="note-text">${n.text}</div><div class="note-date">${n.date}</div></div>`).join('')}
      </div>
    </div>
    <div class="drawer-section">
      <button class="btn btn-ghost" style="width:100%;justify-content:center;color:var(--danger);border-color:rgba(239,68,68,.3)" onclick="deleteContact(${c.id})">Delete Contact</button>
    </div>
  `;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  selectedId=null;
}

function setStage(id,stage){
  const c=contacts.find(x=>x.id===id);
  c.stage=stage;save();renderAll();openDrawer(id);
}

function saveNote(id){
  const c=contacts.find(x=>x.id===id);
  const val=document.getElementById('note-input').value.trim();
  if(!val)return;
  const now=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  c.notes.unshift({text:val,date:now});
  save();renderAll();openDrawer(id);
}

function deleteContact(id){
  if(!confirm('Remove this contact?'))return;
  contacts=contacts.filter(c=>c.id!==id);
  save();closeDrawer();renderAll();
}

function openAddModal(){
  document.getElementById('modal-overlay').classList.add('open');
  ['f-name','f-company','f-title','f-linkedin','f-location'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f-revenue').value='0';
  document.getElementById('f-stage').value='lead';
  document.getElementById('f-source').value='X-Ray';
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

function saveContact(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Name is required');return;}
  const c={
    id:nextId++,
    name,
    company:document.getElementById('f-company').value.trim(),
    title:document.getElementById('f-title').value.trim(),
    linkedin:document.getElementById('f-linkedin').value.trim(),
    stage:document.getElementById('f-stage').value,
    source:document.getElementById('f-source').value,
    revenue:parseInt(document.getElementById('f-revenue').value)||0,
    location:document.getElementById('f-location').value.trim(),
    notes:[],
  };
  contacts.unshift(c);
  save();
  document.getElementById('modal-overlay').classList.remove('open');
  renderAll();
}

function exportCSV(){
  const headers=['Name','Title','Company','Stage','Source','LinkedIn','Revenue','Location'];
  const rows=contacts.map(c=>[c.name,c.title,c.company,c.stage,c.source,c.linkedin,c.revenue,c.location].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='client-acquisition-os-contacts.csv';
  a.click();
}

load();
renderAll();
</script>

<script>

var _jobs = [];
var _jobFilter = '';

function loadAndRenderJobs() {
  var wrap = document.getElementById('job-list-wrap');
  if (!wrap) return;
  if (_jobs.length > 0) { renderJobs(); return; }
  wrap.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text3)">Loading jobs...</div>';
  fetch('data/jobs.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (Array.isArray(data)) {
        _jobs = data;
        try {
          var saved = localStorage.getItem('caos_jobs_stages');
          if (saved) {
            var stages = JSON.parse(saved);
            var map = {};
            stages.forEach(function(s){ map[s.id] = s; });
            _jobs.forEach(function(j){
              if (map[j.id]) {
                if (map[j.id].stage) j.stage = map[j.id].stage;
                if (map[j.id].notes) j.notes = map[j.id].notes;
              }
            });
          }
        } catch(e){}
      }
      renderJobs();
    })
    .catch(function() {
      wrap.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text3)">No jobs yet. Run the weekly refresh to pull jobs.</div>';
    });
}

function filterJobs(stage, btn) {
  _jobFilter = stage;
  var pills = document.querySelectorAll('#view-jobs .filter-pill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  if (btn) btn.classList.add('active');
  renderJobs();
}

function renderJobs() {
  var q = document.getElementById('search') ? document.getElementById('search').value.toLowerCase() : '';
  var list = _jobs.filter(function(j) {
    var mq = !q || (j.title + j.company + j.location).toLowerCase().indexOf(q) > -1;
    var ms = !_jobFilter || j.stage === _jobFilter;
    return mq && ms;
  });
  var wrap = document.getElementById('job-list-wrap');
  if (!wrap) return;
  if (!list.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text3);font-size:14px">No jobs found</div>';
    return;
  }
  var html = '<div class="contact-list">';
  for (var i = 0; i < list.length; i++) {
    var j = list[i];
    var src = j.source || 'Google Jobs';
    var isLI = src.indexOf('LinkedIn') > -1;
    var isIN = src.indexOf('Indeed') > -1;
    var iconBg = isLI ? '#0a66c2' : isIN ? '#003a9b' : '#555';
    var iconTxt = isLI ? 'LI' : isIN ? 'IN' : 'GJ';
    var sal = j.salary ? '<div style="font-size:11px;color:var(--client);font-weight:500">' + j.salary + '</div>' : '';
    var ea = src.indexOf('Easy') > -1 ? '<div style="font-size:10px;background:rgba(10,102,194,.15);color:#60a5fa;padding:2px 6px;border-radius:10px;margin-top:2px;display:inline-block">' + (isLI ? 'Easy Apply' : 'Easily Apply') + '</div>' : '';
    var link = j.url ? '<a href="' + j.url + '" target="_blank" class="li-btn" onclick="event.stopPropagation()" style="text-decoration:none">&#x2197;</a>' : '';
    html += '<div class="contact-row" style="cursor:pointer" onclick="openJobDrawer(' + i + ')">';
    html += '<div style="width:36px;height:36px;border-radius:8px;background:' + iconBg + ';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">' + iconTxt + '</div>';
    html += '<div style="min-width:0"><div class="contact-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + j.title + '</div>';
    html += '<div class="contact-sub">' + j.company + (j.location ? ' &middot; ' + j.location : '') + '</div></div>';
    html += '<div style="text-align:right">' + sal + ea + '</div>';
    var srcTag = isLI ? '<span style="background:rgba(10,102,194,.15);color:#60a5fa;padding:2px 6px;border-radius:8px;font-size:10px;white-space:nowrap">LinkedIn</span>' : isIN ? '<span style="background:rgba(0,58,155,.15);color:#93c5fd;padding:2px 6px;border-radius:8px;font-size:10px;white-space:nowrap">Indeed</span>' : '';
    html += '<div style="display:flex;align-items:center;gap:4px">' + srcTag + link + '</div>';
    html += '</div>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}


function openJobDrawer(idx) {
  var j = _jobs[idx];
  if (!j) return;
  var stages = ['applied','interviewing','offer'];
  var src = j.source || 'Google Jobs';
  var isLI = src.indexOf('LinkedIn') > -1;
  var isIN = src.indexOf('Indeed') > -1;
  var iconBg = isLI ? '#0a66c2' : isIN ? '#003a9b' : '#555';
  var iconTxt = isLI ? 'LI' : isIN ? 'IN' : 'GJ';
  
  document.getElementById('drawer-content').innerHTML =
    '<div style="display:flex;align-items:center;gap:12px">' +
    '<div style="width:48px;height:48px;border-radius:10px;background:' + iconBg + ';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff">' + iconTxt + '</div>' +
    '<div><div class="drawer-name">' + j.title + '</div>' +
    '<div class="drawer-sub">' + j.company + (j.location ? ' &middot; ' + j.location : '') + '</div></div></div>';

  var stagesBtns = stages.map(function(s) {
    var labels = {applied:'Applied',interviewing:'Interviewing',offer:'Offer'};
    var colors = {applied:'var(--lead)',interviewing:'var(--proposal)',offer:'var(--client)'};
    var bgs = {applied:'var(--lead-bg)',interviewing:'var(--proposal-bg)',offer:'var(--client-bg)'};
    var active = j.stage === s ? 'background:'+bgs[s]+';color:'+colors[s]+';border-color:'+colors[s] : '';
    return '<button class="stage-btn" style="'+active+'" onclick="setJobStage('+idx+',\''+s+'\')">'+labels[s]+'</button>';
  }).join('');

  var notesHtml = (j.notes || []).map(function(n) {
    return '<div class="note-entry"><div class="note-text">'+n.text+'</div><div class="note-date">'+n.date+'</div></div>';
  }).join('');

  var srcBadge = isLI ? '<span style="background:rgba(10,102,194,.15);color:#60a5fa;padding:3px 8px;border-radius:10px;font-size:11px">LinkedIn</span>' :
                 isIN ? '<span style="background:rgba(0,58,155,.15);color:#93c5fd;padding:3px 8px;border-radius:10px;font-size:11px">Indeed</span>' :
                 '<span style="background:var(--surface2);color:var(--text2);padding:3px 8px;border-radius:10px;font-size:11px">' + src + '</span>';

  var easyBadge = src.indexOf('Easy') > -1 ? '<span style="background:rgba(16,185,129,.12);color:var(--client);padding:3px 8px;border-radius:10px;font-size:11px;margin-left:4px">' + (isLI ? 'Easy Apply' : 'Easily Apply') + '</span>' : '';

  document.getElementById('drawer-body').innerHTML =
    (j.url ? '<div class="drawer-section"><a href="'+j.url+'" target="_blank" style="color:var(--lead);font-size:13px;text-decoration:none;font-weight:500">&#x2197; View &amp; Apply</a></div>' : '') +
    '<div class="drawer-section"><div class="drawer-label">Source</div>' + srcBadge + easyBadge + '</div>' +
    (j.salary ? '<div class="drawer-section"><div class="drawer-label">Salary</div><div style="font-size:18px;font-weight:600;color:var(--client)">'+j.salary+'</div></div>' : '') +
    '<div class="drawer-section"><div class="drawer-label">Stage</div><div class="stage-buttons">'+stagesBtns+'</div></div>' +
    '<div class="drawer-section"><div class="drawer-label">Notes</div>' +
    '<textarea class="note-box" id="job-note-box" placeholder="Add notes, next steps..."></textarea>' +
    '<button class="note-save-btn" onclick="saveJobNote('+idx+')">Save Note</button>' +
    '<div style="margin-top:10px">'+notesHtml+'</div></div>';

  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function setJobStage(idx, stage) {
  _jobs[idx].stage = stage;
  try { localStorage.setItem('caos_jobs_stages', JSON.stringify(_jobs.map(function(j){return {id:j.id,stage:j.stage,notes:j.notes};}))) } catch(e){}
  renderJobs();
  openJobDrawer(idx);
}

function saveJobNote(idx) {
  var val = document.getElementById('job-note-box').value.trim();
  if (!val) return;
  _jobs[idx].notes = _jobs[idx].notes || [];
  _jobs[idx].notes.unshift({text: val, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});
  try { localStorage.setItem('caos_jobs_stages', JSON.stringify(_jobs.map(function(j){return {id:j.id,stage:j.stage,notes:j.notes};}))) } catch(e){}
  openJobDrawer(idx);
}
